<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ResearchFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════════ SCREEN: DASHBOARD ══════════════════ -->
  <div id="screen-dashboard" class="screen active">
    <div class="dash-header">
      <div class="eyebrow">ResearchFlow</div>
      <h1>My Research<br><em>Project</em></h1>
      <p>Tap a section to open · Hold to delete</p>
    </div>

    <div class="dash-grid" id="dashGrid"></div>

    <div class="dash-empty" id="dashEmpty">
      <div class="empty-icon">📂</div>
      <p>No sections yet.<br>Tap the button below to create your first one.</p>
    </div>

    <button class="add-section-btn" id="addSectionBtn">＋ New Section</button>
  </div>

  <!-- ══════════════════ SCREEN: FEED ══════════════════ -->
  <div id="screen-feed" class="screen">
    <div class="feed-header">
      <button class="back-btn" id="feedBackBtn">←</button>
      <span class="feed-title" id="feedTitle">Section</span>
      <div class="feed-header-spacer"></div>
    </div>
    <div class="feed-body" id="feedBody"></div>
  </div>

  <!-- ══════════════════ FAB ══════════════════ -->
  <button class="fab" id="fab">＋</button>

  <!-- ══════════════════ MODAL: NEW SECTION ══════════════════ -->
  <div class="modal-overlay" id="sectionModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 class="modal-title">New Section</h2>
      <div class="form-group">
        <label class="form-label">Section Name</label>
        <input type="text" class="form-input" id="sectionNameInput" placeholder="e.g. Target Market, Statistics…" maxlength="40">
      </div>
      <div class="form-group">
        <label class="form-label">Pick a Color</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Pick an Icon</label>
        <div class="icon-picker" id="iconPicker"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="sectionCancel">Cancel</button>
        <button class="btn-primary" id="sectionSave">Create Section</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════ PANEL: NEW / EDIT POST ══════════════════ -->
  <div class="post-panel" id="postPanel">
    <div class="panel-header">
      <button class="back-btn" id="panelCloseBtn">✕</button>
      <span class="panel-title" id="panelTitle">New Post</span>
      <button class="save-btn" id="panelSaveBtn">Save</button>
    </div>
    <div class="panel-body">

      <div class="form-group">
        <label class="form-label">Label</label>
        <div class="label-row">
          <select class="form-select" id="postLabel"></select>
          <button class="add-label-btn" id="addLabelBtn" title="Add custom label">＋</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" class="form-input" id="postTitle" placeholder="Enter a title…">
      </div>

      <div class="form-group">
        <label class="form-label">Content</label>
        <textarea class="form-textarea" id="postContent" placeholder="Write your research note… wrap words in **double stars** to highlight them"></textarea>
      </div>

      <!-- SMART TOOLS -->
      <div class="smart-tools" id="smartTools"></div>

      <!-- IMAGE -->
      <div class="form-group">
        <label class="form-label">Image <span class="optional">optional</span></label>
        <div class="img-upload-zone" id="imgUploadZone">
          <span class="upload-icon">📷</span>
          <span>Tap to attach a photo or screenshot</span>
          <input type="file" id="imgInput" accept="image/*">
        </div>
        <img class="img-preview" id="imgPreview" alt="preview">
        <button class="img-remove-btn" id="imgRemoveBtn">✕ Remove image</button>
      </div>

    </div>
  </div>

  <!-- ══════════════════ MODAL: ADD LABEL ══════════════════ -->
  <div class="modal-overlay" id="addLabelModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 class="modal-title">Add Custom Label</h2>
      <div class="form-group">
        <label class="form-label">Label Name</label>
        <input type="text" class="form-input" id="newLabelInput" placeholder="e.g. Methodology, Interview…" maxlength="30">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="addLabelCancel">Cancel</button>
        <button class="btn-primary" id="addLabelSave">Add Label</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════ MODAL: DELETE CONFIRM ══════════════════ -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal-sheet modal-sheet--sm">
      <div class="modal-handle"></div>
      <div class="delete-icon-big" id="deleteModalIcon">🗑️</div>
      <h2 class="modal-title" id="deleteModalTitle">Delete Post?</h2>
      <p class="modal-sub" id="deleteModalSub">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="deleteCancel">Cancel</button>
        <button class="btn-danger" id="deleteConfirm">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
